<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹디자인개발기능사 레이아웃 B-2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      #background {
        width: 100%;
        margin: 0 auto;
        background-color: #eaeaea;
      }

      #layout {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
      }

      .inner {
        width: 100%;
        max-width: 1200px;
        height: 100%;
        margin: 0 auto;
      }

      /* HEADER CSS */
      #header {
        width: 100%;
        height: 100px;
        background-color: #fff8a7;
      }
      #header .inner {
        display: flex;
      }
      #header .logo {
        width: 20%;
        height: 100%;
        background-color: #f0fe30;
      }
      #header .nav {
        width: 80%;
        height: 100%;
        background-color: #f8ff8f;
      }

      /* MAIN CSS */
      #main {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
      }
      #main #section1 {
        height: 300px;
        background-color: #ff8514;
      }
      #main #section2 {
        display: flex;
        width: 100%;
        height: 200px;
      }
      #main #section2 .section2-content1 {
        flex: 1;
        background-color: #ffb380;
      }
      #main #section2 .section2-content2 {
        flex: 1;
        background-color: #ffcc99;
      }
      #main #section2 .section2-content3 {
        flex: 1;
        background-color: #ffdbb3;
      }

      /* FOOTER CSS */
      #footer {
        width: 100%;
        height: 100px;
        background-color: #5c5c5c;
      }
      #footer .inner {
        display: flex;
      }
      #footer #footer-content1 {
        width: 100%;
        background-color: #4d4d4d;
      }
      #footer #footer-content2 {
        width: 20%;
        display: flex;
        flex-direction: column;
      }
      #footer #footer-content2 .footer-content2-1 {
        background-color: #737373;
        flex: 1;
      }
      #footer #footer-content2 .footer-content2-2 {
        background-color: #bcbcbc;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div id="background">
      <header id="header">
        <div class="inner">
          <div class="logo">로고</div>
          <nav class="nav">메뉴</nav>
        </div>
      </header>

      <div id="layout">
        <main id="main">
          <section id="section1">이미지 슬라이드</section>
          <section id="section2">
            <div class="section2-content1">공지사항</div>
            <div class="section2-content2">갤러리</div>
            <div class="section2-content3">바로가기</div>
          </section>
        </main>
      </div>

      <footer id="footer">
        <div class="inner">
          <div id="footer-content1">하단메뉴</div>
          <div id="footer-content2">
            <div class="footer-content2-1">SNS</div>
            <div class="footer-content2-2">패밀리 사이트</div>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
