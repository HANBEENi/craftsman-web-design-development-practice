<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹디자인개발기능사 메뉴 레이아웃 연습하기 M-1</title>
  </head>
  <style>
    /* COMMON CSS */
    * {
      margin: 0;
      padding: 0;
      list-style: none;
      text-decoration: none;
      color: inherit;
      box-sizing: border-box;
    }

    /* HEADER CSS */
    #header {
      display: flex;
      width: 100%;
      height: 100px;
      background-color: #dbdbdb;
    }
    #logo {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 200px;
      height: 100%;
      font-size: 30px;
      font-weight: bold;
      background-color: #5c5c5c;
    }
    #nav {
      display: flex;
      justify-content: end;
      align-items: center;
      padding-right: 20px;
      width: 100%;
      height: 100%;
      background-color: #afafaf;
    }
    #nav ul {
      display: flex;
    }
    #nav ul li {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      width: 180px;
      height: 43px;
      background-color: #dbdbdb;
      cursor: pointer;
    }
    #nav ul li:hover {
      background-color: #494949;
      color: #dbdbdb;

      #nav ul li ul {
        display: block;
      }
    }
    #nav ul li ul {
      display: none;
      flex-direction: column;

      position: absolute;
      top: 50px;
      left: 0;
      color: #494949;
    }
    #nav ul li ul li {
      background-color: #f0f0f0;
    }
    #nav ul li ul li:hover {
      background-color: #e2fffd;
      color: #494949;
    }
    #nav ul li ul li a {
    }

    /* SLIDER CSS */
    #slider {
      width: 100%;
      height: 350px;
      background-color: #727272;
    }

    /* CONTENTS CSS */
    #contents {
      display: flex;
      width: 100%;
      height: 200px;
    }
    #content1 {
      flex: 1;
      height: 100%;
      background-color: #dbdbdb;
    }
    #content2 {
      flex: 1;
      height: 100%;
      background-color: #a4a4a4;
    }
    #content3 {
      flex: 1;
      height: 100%;
      background-color: #646464;
    }

    /* FOOTER CSS */
    #footer {
      display: flex;
      width: 100%;
      height: 100px;
    }
    #f-info1 {
      width: 200px;
      height: 100%;
      background-color: #4a4a4a;
    }
    #f-info2 {
      width: 100%;
      height: 100%;
      background-color: #717171;
    }
    #f-info3 {
      width: 200px;
      height: 100%;
      background-color: #494949;
    }
  </style>
  <body>
    <!-- HEADER -->
    <header id="header">
      <div id="logo"></div>
      <nav id="nav">
        <ul>
          <li>
            <a href="#">메뉴1</a>
            <ul>
              <li><a href="#">서브메뉴1-1</a></li>
              <li><a href="#">서브메뉴1-2</a></li>
              <li><a href="#">서브메뉴1-3</a></li>
              <li><a href="#">서브메뉴1-4</a></li>
            </ul>
          </li>
          <li>
            <a href="#">메뉴2</a>
            <ul>
              <li><a href="#">서브메뉴2-1</a></li>
              <li><a href="#">서브메뉴2-2</a></li>
              <li><a href="#">서브메뉴2-3</a></li>
              <li><a href="#">서브메뉴2-4</a></li>
            </ul>
          </li>
          <li>
            <a href="#">메뉴3</a>
            <ul>
              <li><a href="#">서브메뉴3-1</a></li>
              <li><a href="#">서브메뉴3-2</a></li>
              <li><a href="#">서브메뉴3-3</a></li>
              <li><a href="#">서브메뉴3-4</a></li>
            </ul>
          </li>
          <li>
            <a href="#">메뉴4</a>
            <ul>
              <li><a href="#">서브메뉴4-1</a></li>
              <li><a href="#">서브메뉴4-2</a></li>
              <li><a href="#">서브메뉴4-3</a></li>
              <li><a href="#">서브메뉴4-4</a></li>
            </ul>
          </li>
        </ul>
      </nav>
    </header>

    <section id="slider"></section>

    <section id="contents">
      <div id="content1"></div>
      <div id="content2"></div>
      <div id="content3"></div>
    </section>

    <footer id="footer">
      <div id="f-info1"></div>
      <div id="f-info2"></div>
      <div id="f-info3"></div>
    </footer>
  </body>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
  <script>
    $(document).ready(function () {
      $('#nav ul li').hover(
        function () {
          $(this).find('ul').stop().slideDown();
        },
        function () {
          $(this).find('ul').stop().slideUp();
        },
      );
    });
  </script>
</html>
