<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹디자인기능사 레이아웃 A-2</title>
    <style>
      /* Reset CSS */
      * {
        margin: 0;
        padding: 0;
      }

      /* Layout Wrap CSS */
      #wrap {
        width: 1200px;
        margin: 0 auto; /* 블록구조를 가운데 정렬 */
      }

      /* Header CSS */
      #header {
        width: 1200px;
        display: flex;
      }
      #header .logo {
        width: 20%;
        height: 100px;
      }
      #header .nav {
        width: 80%;
        height: 100px;
        background-color: rgb(183, 203, 203);
      }

      /* Slider CSS */
      #slider {
        width: 1200px;
        height: 300px;
        background-color: #0f0;
      }

      /* Contents CSS */
      #contents {
        display: flex;
        width: 1200px;
        height: 200px;
      }
      #contents .content1 {
        width: 33.3%;
        height: 200px;
        background-color: rgb(223, 40, 255);
      }
      #contents .content2 {
        width: 33.3%;
        height: 200px;
        background-color: rgb(157, 104, 186);
      }
      #contents .content3 {
        width: 33.3%;
        height: 200px;
        background-color: rgb(156, 126, 255);
      }

      /* Footer CSS */
      #footer {
        display: flex;
        width: 1200px;
        background-color: rgb(167, 167, 167);
      }
      #footer .footer-content1 {
        width: 20%;
        height: 100px;
        background-color: rgb(117, 117, 117);
      }
      #footer .footer-content2 {
        width: 100%;
        height: 100px;
        background-color: rgb(88, 88, 88);
      }
      #footer .footer-content3 {
        width: 20%;
        height: 100px;
        background-color: rgb(162, 162, 162);
      }
    </style>
  </head>

  <body>
    <div id="wrap">
      <!-- Header -->
      <header id="header">
        <h1 class="logo">로고</h1>
        <nav class="nav">네비게이션</nav>
      </header>

      <!-- Slider -->
      <article id="slider">슬라이더</article>

      <!-- Contents -->
      <main id="contents">
        <div class="content1">콘텐츠 1</div>
        <div class="content2">콘텐츠 2</div>
        <div class="content3">콘텐츠 3</div>
      </main>

      <!-- Footer -->
      <footer id="footer">
        <div class="footer-content1">푸터 콘텐츠 1</div>
        <div class="footer-content2">푸터 콘텐츠 2</div>
        <div class="footer-content3">푸터 콘텐츠 3</div>
      </footer>
    </div>
  </body>
</html>
