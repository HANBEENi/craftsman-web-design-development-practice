<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹디자인개발기능사 레이아웃 A-4</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        #wrap{
            width: 1200px;
            margin: 0 auto;
        }

        /* Header CSS */
        #header{
            width: 1200px;
            height: 100px;
            display: flex;
        }
        #header .logo{
            width: 20%;
            height: 100px;
        }
        #header .nav{
            width: 80%;
            height: 100px;
            background-color: rgb(183, 203, 203);
        }  

        /* Slider CSS */
        #slider{
            width: 1200px;
            height: 300px;
            background-color: #0f0;
        }  

        /* Contents CSS */
        #contents{
            display: flex;
            width: 1200px;
            height: 200px;
        }
        #contents .content1{
            width: 33.3%;
            background-color: rgb(117, 117, 117);
        }
        #contents .content2{
            width: 33.3%;
            background-color: rgb(162, 162, 162);
        }
        #contents .content3{
            width: 33.3%;
            background-color: rgb(117, 117, 117);
        }


        /* Footer CSS */
        #footer{
            display: flex;
            width: 1200px;
            height: 100px;
            background-color: rgb(167, 167, 167);
        }
        #footer .footer-content1{
            display: flex;
            flex-direction: column;
            width: 100%;
            background-color: rgb(223, 40, 255);
        }
        #footer .footer-content1-1{
            flex: 1;
            background-color: rgb(157, 104, 186);
        }
        #footer .footer-content1-2{
            flex: 1;
            background-color: rgb(156, 126, 255);
        }
        #footer .footer-content2{
            width: 20%;
        }
    </style>
  </head>

  <body>
    <div id="wrap">
      <!-- Header -->
      <header id="header">
        <h1 class="logo">로고</h1>
        <nav class="nav">네비게이션</nav>
      </header>

      <!-- Slider -->
      <article id="slider">슬라이더</article>

      <!-- Main Content -->
      <main id="contents">
        <section class="content1">콘텐츠 1</section>
        <section class="content2">콘텐츠 2</section>
        <section class="content3">콘텐츠 3</section>
      </main>

      <!-- Footer -->
      <footer id="footer">
        <div class="footer-content1">
          <section class="footer-content1-1">푸터 콘텐츠 1-1</section>
          <section class="footer-content1-2">푸터 콘텐츠 1-2</section>
        </div>
        <section class="footer-content2">푸터 콘텐츠 2</section>
        
      </footer>
  </body>
</html>
